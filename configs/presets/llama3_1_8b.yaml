name: "Llama-3.1-8B"
description: "Llama 3.1 8B on 8x Ascend 910C — single-node RL training"
model:
  name: "Llama-3.1-8B"
  hidden_size: 4096
  vocab_size: 128256
  num_layers: 32
  dtype: bf16
  layer:
    attention: GQA
    num_heads: 32
    num_kv_heads: 8
    head_dim: 128
    ffn: SwiGLU
    intermediate_size: 14336
    residual: standard
hardware: "Ascend 910C"
total_devices: 8
parallelism:
  tp: 1
  pp: 1
  ep: 1
  cp: 1
  cp_type: ring
  sp: false
  zero_stage: 0
  pp_schedule: "1f1b"
  recompute_attention: false
  full_recomputation: false
  optimizer_offload: false
  activation_offload: false
rl:
  total_prompts: 10000
  group_size: 8
  avg_prompt_len: 512
  avg_response_len: 2048
  max_response_len: 4096
  train_micro_batch_size: 4
  gradient_accumulation_steps: 1
  gen_batch_size: 64
  colocated: false
  reference_model: true
  ref_offload_cpu: false
  use_speculative_decoding: false
